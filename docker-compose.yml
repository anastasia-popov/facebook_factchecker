version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factchecker}
      POSTGRES_USER: ${POSTGRES_USER:-factchecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factchecker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factchecker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3003:3003"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # API Keys
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY}
      CLAIMBUSTER_API_KEY: ${CLAIMBUSTER_API_KEY}

      # OAuth Configuration
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}

      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      REFRESH_TOKEN_EXPIRATION_DAYS: ${REFRESH_TOKEN_EXPIRATION_DAYS:-30}

      # Database (PostgreSQL)
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-factchecker}:${POSTGRES_PASSWORD:-factchecker}@db:5432/${POSTGRES_DB:-factchecker}}

      # Backend URL
      BACKEND_URL: ${BACKEND_URL}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
