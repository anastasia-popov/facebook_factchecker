<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #050505;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #050505;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e4e6eb;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
    }
    button {
      background-color: #31a24c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #2a8f40;
    }
    @keyframes fc-magnify {
      0% { transform: translate(0, -14px) rotate(-15deg); }
      12.5% { transform: translate(10px, -10px) rotate(-15deg); }
      25% { transform: translate(14px, 0) rotate(-15deg); }
      37.5% { transform: translate(10px, 10px) rotate(-15deg); }
      50% { transform: translate(0, 14px) rotate(-15deg); }
      62.5% { transform: translate(-10px, 10px) rotate(-15deg); }
      75% { transform: translate(-14px, 0) rotate(-15deg); }
      87.5% { transform: translate(-10px, -10px) rotate(-15deg); }
      100% { transform: translate(0, -14px) rotate(-15deg); }
    }
    #loadingContainer {
      display: none;
      text-align: center;
      padding: 32px 16px;
      gap: 16px;
    }
    #loadingContainer.show {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loading-icon {
      font-size: 48px;
      animation: fc-magnify 2.5s ease-in-out infinite;
    }
    .loading-text {
      font-weight: 500;
      color: #0891B2;
    }
  </style>
</head>
<body>
  <div id="contentContainer">
    <div class="form-group">
      <label for="imageUrl">Image URL or Paste Screenshot</label>
      <input type="text" id="imageUrl" placeholder="https://... or Ctrl+V to paste screenshot">
      <div style="font-size: 11px; color: #65676b; margin-top: 4px;">
        📋 Paste image from clipboard (Ctrl+V) or paste image URL
      </div>
    </div>

    <button id="ocrBtn">Extract Text & Fact-Check</button>
  </div>

  <div id="loadingContainer">
    <div class="loading-icon">🔍</div>
    <div class="loading-text">Fact-checking...</div>
  </div>
</body>
<script src="popup.js"></script>
</html>
