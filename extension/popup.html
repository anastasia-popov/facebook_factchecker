<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #050505;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #050505;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e4e6eb;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
    }
    button {
      background-color: #31a24c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #2a8f40;
    }
  </style>
</head>
<body>
  <div class="form-group">
    <label for="imageUrl">Image URL or Paste Screenshot</label>
    <input type="text" id="imageUrl" placeholder="https://... or Ctrl+V to paste screenshot">
    <div style="font-size: 11px; color: #65676b; margin-top: 4px;">
      📋 Paste image from clipboard (Ctrl+V) or paste image URL
    </div>
  </div>

  <button id="ocrBtn">Extract Text & Fact-Check</button>
</body>
<script src="popup.js"></script>
</html>
