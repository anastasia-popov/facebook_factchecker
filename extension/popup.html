<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #050505;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #050505;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e4e6eb;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
    }
    button {
      background-color: #31a24c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #2a8f40;
    }
    #loadingContainer {
      display: none;
      text-align: center;
      padding: 0;
      gap: 0;
      width: 100%;
      height: 350px;
      justify-content: center;
    }
    #loadingContainer.show {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .loading-icon {
      width: 100%;
      height: 85%;
      object-fit: contain;
      flex: 1;
    }
    .loading-text {
      font-weight: 500;
      color: #0891B2;
      flex-shrink: 0;
      padding: 16px;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="contentContainer">
    <div class="form-group">
      <label for="imageUrl">Image URL or Paste Screenshot</label>
      <input type="text" id="imageUrl" placeholder="https://... or Ctrl+V to paste screenshot">
      <div style="font-size: 11px; color: #65676b; margin-top: 4px;">
        📋 Paste image from clipboard (Ctrl+V) or paste image URL
      </div>
    </div>

    <button id="ocrBtn">Extract Text & Fact-Check</button>
  </div>

  <div id="loadingContainer">
    <img src="loader_animation.gif" class="loading-icon" alt="Loading...">
    <div class="loading-text">Fact-checking...</div>
  </div>
</body>
<script src="popup.js"></script>
</html>
