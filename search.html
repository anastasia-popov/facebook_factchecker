<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_11 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_11" style="display:block;"><svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter height="140%" id="glass-shadow" width="140%" x="-20%" y="-20%">
<fegaussianblur in="SourceAlpha" stddeviation="2"></fegaussianblur>
<feoffset dx="1" dy="1" result="offsetblur"></feoffset>
<fecomponenttransfer>
<fefunca slope="0.3" type="linear"></fefunca>
</fecomponenttransfer>
<femerge>
<femergenode></femergenode>
<femergenode in="SourceGraphic"></femergenode>
</femerge>
</filter>
</defs>
<g filter="url(#glass-shadow)">
<!-- 
      Truly fluid circular orbit.
      The orbit is 15 units in radius.
      Using animateMotion with a circular path ensures perfectly uniform velocity and no "hiccups".
    -->
<g>
<animatemotion dur="4s" path="M 50,35 A 15,15 0 1 1 49.99,35 Z" repeatcount="indefinite"></animatemotion>
<!-- Centering and orientation (no rotation) -->
<g transform="rotate(-45)">
<!-- Handle -->
<rect fill="#334155" height="25" rx="1" width="6" x="-3" y="15"></rect>
<!-- Rim -->
<circle cx="0" cy="0" fill="none" r="18" stroke="#334155" stroke-width="6"></circle>
<!-- Glass surface -->
<circle cx="0" cy="0" fill="rgba(203, 213, 225, 0.15)" r="16"></circle>
<!-- Shine/Reflect -->
<path d="M-8 -8 Q -4 -12 0 -8" fill="none" opacity="0.6" stroke="white" stroke-linecap="round" stroke-width="1.5"></path>
</g>
</g>
</g>
</svg></div><!-- STITCH_SVG_END:ANIMATION_11 -->
</body>
</html>
