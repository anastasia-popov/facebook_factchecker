<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #050505;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px 0;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px;
      background-color: #f1f3f4;
      border-radius: 6px;
    }
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .status-indicator.ok {
      background-color: #34a853;
    }
    .status-indicator.error {
      background-color: #ea4335;
    }
    .status-text {
      flex: 1;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #050505;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e4e6eb;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #1877f2;
      box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
    }
    button {
      background-color: #1877f2;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #165ec7;
    }
    .info-text {
      margin-top: 16px;
      padding: 12px;
      background-color: #e7f3ff;
      border-left: 3px solid #1877f2;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
      color: #065fd4;
    }
    a {
      color: #1877f2;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>🔍 Fact Checker</h1>

  <div class="status">
    <div class="status-indicator" id="statusIndicator"></div>
    <div class="status-text" id="statusText">Checking…</div>
  </div>

  <div class="form-group">
    <label for="backendUrl">Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000">
  </div>

  <button id="saveBtn">Save</button>

  <div class="info-text">
    To get started:<br>
    1. Set up API keys in the backend<br>
    2. Run <code>uvicorn main:app</code> in the backend folder<br>
    3. Visit Facebook and click "Fact Check" on any post
  </div>
</body>
<script src="popup.js"></script>
</html>
