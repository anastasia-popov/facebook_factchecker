<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 350px;
      min-height: 200px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #050505;
      background: #ffffff;
    }
    .panel {
      display: none;
      padding: 16px;
    }
    .panel.active {
      display: block;
    }
    .header {
      background: linear-gradient(135deg, #F0F9FB 0%, #F5FEFB 100%);
      border-bottom: 2px solid #0891B2;
      padding: 12px 16px;
      margin: -16px -16px 16px -16px;
    }
    .header h2 {
      font-size: 15px;
      font-weight: 700;
      color: #0891B2;
      margin: 0;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      color: #050505;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e4e6eb;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0891B2;
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
    }
    button {
      background-color: #0891B2;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0a6b8a;
    }
    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    button.secondary {
      background-color: #e5e7eb;
      color: #050505;
      margin-top: 8px;
    }
    button.secondary:hover {
      background-color: #d1d5db;
    }
    .profile-section {
      background: #f9fafb;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .profile-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .profile-item label {
      font-weight: 600;
      margin: 0;
      color: #374151;
    }
    .profile-item value {
      color: #0891B2;
      font-weight: 500;
    }
    .quota-bar {
      background: #e5e7eb;
      height: 6px;
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }
    .quota-fill {
      height: 100%;
      background: #0891B2;
      transition: width 0.3s;
    }
    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #7F1D1D;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .success {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      color: #166534;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0891B2;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Login Panel -->
  <div id="loginPanel" class="panel active">
    <div class="header">
      <h2>🔐 Fact Checker</h2>
    </div>
    <p style="color: #6b7280; margin-bottom: 16px;">Sign in with your Google account to start fact-checking.</p>
    <button id="googleLoginBtn" style="background-color: #4285F4;">
      <span style="margin-right: 6px;">🔍</span> Sign in with Google
    </button>
    <div id="loginError" class="error" style="display: none;"></div>
  </div>

  <!-- Profile Panel -->
  <div id="profilePanel" class="panel">
    <div class="header">
      <h2>👤 Profile</h2>
    </div>

    <div class="profile-section">
      <div class="profile-item">
        <label>Username</label>
        <span id="username"></span>
      </div>
      <div class="profile-item">
        <label>Member Since</label>
        <span id="memberSince"></span>
      </div>
    </div>

    <div style="background: #f9fafb; padding: 12px; border-radius: 8px; margin-bottom: 12px;">
      <div style="font-weight: 700; color: #050505; margin-bottom: 12px;">📅 Monthly Quota</div>
      <div class="profile-item">
        <label>Used This Month</label>
        <span id="monthlyUsed">0</span> / <span id="monthlyLimit">5000</span>
      </div>
      <div class="quota-bar">
        <div id="monthlyBar" class="quota-fill" style="width: 0%"></div>
      </div>
    </div>

    <div id="contentContainer">
      <div class="form-group">
        <label for="imageUrl">Image URL or Paste Screenshot</label>
        <input type="text" id="imageUrl" placeholder="https://... or Ctrl+V to paste screenshot">
        <div style="font-size: 11px; color: #65676b; margin-top: 4px;">
          📋 Paste image from clipboard (Ctrl+V) or paste image URL
        </div>
      </div>
      <button id="ocrBtn">Extract Text & Fact-Check</button>
    </div>

    <button id="logoutBtn" class="secondary">Logout</button>
  </div>

  <div id="loadingContainer" style="display: none; text-align: center; padding: 16px;">
    <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 12px;">
      <div class="loading-spinner"></div>
      <span>Processing...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
